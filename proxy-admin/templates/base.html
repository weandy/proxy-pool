<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Proxy Admin{% endblock %}</title>
<link rel="stylesheet" href="/static/fonts.css">
<meta name="csrf-token" content="{{ csrf_token }}">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#131518;--surface:#1a1d22;--surface-2:#21252b;--surface-3:#282d35;
  --border:#2e343d;--border-2:#3a4150;
  --text:#e8e6e3;--text-2:#a3a09a;--muted:#6d6a63;
  --accent:#3d9be9;--accent-soft:rgba(61,155,233,.12);--accent-hover:#5aafe8;
  --success:#45b26b;--warn:#e0a535;--danger:#e05252;--info:#6db0e0;
  --radius:12px;--radius-sm:8px
}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:15px;min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}
a:hover{color:var(--accent-hover)}

/* === Layout === */
.wrap{display:flex;min-height:100vh}
.sidebar{width:230px;background:var(--surface);border-right:1px solid var(--border);padding:1.5rem 0;display:flex;flex-direction:column;position:fixed;height:100vh;z-index:10}
.sidebar .logo{padding:0 1.4rem;font-weight:800;font-size:1.1rem;margin-bottom:2rem;color:var(--accent);letter-spacing:-.3px;display:flex;align-items:center;gap:.6rem}
.sidebar .logo .logo-icon{width:26px;height:26px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#6c5ce7);display:flex;align-items:center;justify-content:center;font-size:.7rem;color:#fff;font-weight:800}
.sidebar nav{display:flex;flex-direction:column;gap:2px;padding:0 .5rem}
.sidebar nav a{display:flex;align-items:center;gap:.65rem;padding:.6rem .9rem;color:var(--text-2);font-weight:500;font-size:.88rem;border-radius:var(--radius-sm);transition:all .15s;letter-spacing:-.1px}
.sidebar nav a:hover{background:var(--surface-2);color:var(--text)}
.sidebar nav a.active{background:var(--accent-soft);color:var(--accent);font-weight:600}
.sidebar nav a .nav-icon{width:18px;height:18px;opacity:.5;flex-shrink:0}
.sidebar nav a.active .nav-icon{opacity:.9}
.sidebar .bottom{margin-top:auto;padding:.8rem 1.4rem;border-top:1px solid var(--border);font-size:.82rem;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
.main{margin-left:230px;flex:1;padding:2rem 2.5rem}

/* === Hamburger (移动端) === */
.hamburger{display:none;position:fixed;top:.8rem;left:.8rem;z-index:20;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.5rem;cursor:pointer;color:var(--text)}
.hamburger svg{width:22px;height:22px}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9}

@media(max-width:768px){
  .hamburger{display:flex}
  .sidebar{transform:translateX(-100%);transition:transform .25s ease;z-index:11}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay.show{display:block}
  .main{margin-left:0;padding:1rem 1rem;padding-top:3.5rem}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  table{font-size:.78rem}
  .hd{flex-direction:column;align-items:flex-start;gap:.6rem}
}

/* === Header === */
.hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem}
.hd h1{font-size:1.4rem;font-weight:700;letter-spacing:-.3px}
.toolbar{display:flex;gap:.5rem;align-items:center}

/* === Card === */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem 1.4rem;margin-bottom:1rem;transition:border-color .2s}
.card:hover{border-color:var(--border-2)}
.card-h{font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:.8rem}

/* === Stats Grid === */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:.8rem}
.stat-card{text-align:center;padding:1.1rem .8rem}
.stat-num{font-size:2rem;font-weight:800;color:var(--accent);font-family:'JetBrains Mono',monospace}
.stat-num.warn{color:var(--warn)}
.stat-num.info{color:var(--info)}
.stat-num.danger{color:var(--danger)}
.stat-label{font-size:.78rem;color:var(--muted);margin-top:.3rem;font-weight:500}

/* === Buttons === */
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.45rem .9rem;border:none;border-radius:var(--radius-sm);font-family:'Plus Jakarta Sans';font-size:.84rem;font-weight:600;cursor:pointer;transition:all .15s;letter-spacing:-.1px}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,var(--accent),#5a7ce8);color:#fff;box-shadow:0 2px 8px rgba(61,155,233,.2)}
.btn-primary:hover{box-shadow:0 4px 16px rgba(61,155,233,.3);opacity:.95}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-2)}
.btn-outline:hover{background:var(--surface-2);border-color:var(--border-2)}
.btn-sm{padding:.3rem .65rem;font-size:.78rem}
.btn-danger{background:transparent;border:1px solid rgba(224,82,82,.25);color:var(--danger)}
.btn-danger:hover{background:rgba(224,82,82,.08)}
.btn-success{background:transparent;border:1px solid rgba(69,178,107,.25);color:var(--success)}
.btn-success:hover{background:rgba(69,178,107,.08)}

/* === Table === */
table{width:100%;border-collapse:collapse;font-size:.9rem}
th{text-align:left;font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:.55rem .5rem;border-bottom:1px solid var(--border)}
td{padding:.5rem;border-bottom:1px solid var(--border);color:var(--text-2)}
tr:hover td{background:var(--surface-2)}
.mono{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--info)}

/* === Tags & Scores === */
.tag{font-size:.7rem;font-weight:700;padding:.15rem .45rem;border-radius:5px;background:var(--accent-soft);color:var(--accent);letter-spacing:.3px}
.score-good{color:var(--success);font-weight:700}
.score-mid{color:var(--warn);font-weight:700}
.score-bad{color:var(--danger);font-weight:700}
.status-active{font-size:.72rem;font-weight:700;padding:.15rem .45rem;border-radius:5px;background:rgba(69,178,107,.12);color:var(--success)}
.status-disabled{font-size:.72rem;font-weight:700;padding:.15rem .45rem;border-radius:5px;background:rgba(224,82,82,.12);color:var(--danger)}

/* === Forms === */
input[type=text],input[type=number],input[type=password],textarea,select{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:.5rem .8rem;font-family:'Plus Jakarta Sans';font-size:.88rem;color:var(--text);outline:none;width:100%;transition:all .2s}
input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.form-row{margin-bottom:1rem}
.form-row label{display:block;font-size:.78rem;font-weight:600;color:var(--text-2);margin-bottom:.3rem}

/* === Toast === */
.toast{position:fixed;top:1rem;right:1rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.7rem 1.2rem;font-size:.86rem;z-index:9999;opacity:0;transform:translateY(-12px);transition:all .3s ease;pointer-events:none;backdrop-filter:blur(12px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.toast.show{opacity:1;transform:translateY(0)}

/* === Pagination === */
.pager{display:flex;align-items:center;justify-content:center;margin-top:1.2rem;padding:.6rem 0;position:relative}
.pager .pager-center{display:flex;align-items:center;gap:6px}
.pager button{background:var(--surface-2);border:1px solid var(--border);color:var(--text-2);border-radius:8px;width:34px;height:34px;display:inline-flex;align-items:center;justify-content:center;font-size:.82rem;font-family:'Plus Jakarta Sans';font-weight:600;cursor:pointer;transition:all .2s}
.pager button:hover:not(:disabled):not(.active){background:var(--surface-3);border-color:var(--accent);color:var(--accent);transform:translateY(-1px);box-shadow:0 2px 8px rgba(61,155,233,.15)}
.pager button.active{background:linear-gradient(135deg,var(--accent),#5a7ce8);color:#fff;border-color:transparent;box-shadow:0 2px 10px rgba(61,155,233,.25);font-weight:700}
.pager button:disabled:not(.active){opacity:.25;cursor:default}
.pager .pager-info{font-size:.76rem;color:var(--muted);font-weight:500;white-space:nowrap}
.pager .pager-info-left{position:absolute;left:0}
.pager .pager-info-right{position:absolute;right:0}

/* === Empty State === */
.empty{text-align:center;padding:2.5rem;color:var(--muted);font-size:.9rem}

/* === Checkbox === */
input[type=checkbox]{-webkit-appearance:none;appearance:none;width:18px;height:18px;border:2px solid var(--border-2);border-radius:6px;background:var(--surface-2);cursor:pointer;transition:all .15s;position:relative;flex-shrink:0}
input[type=checkbox]:checked{background:var(--accent);border-color:var(--accent)}
input[type=checkbox]:checked::after{content:'';position:absolute;left:5px;top:2px;width:5px;height:9px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
input[type=checkbox]:hover{border-color:var(--accent)}

/* === Scrollbar === */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--border-2)}
</style>
{% block head %}{% endblock %}
</head>
<body>
{% block body %}
<button class="hamburger" id="hamburgerBtn" onclick="toggleSidebar()">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<div class="wrap">
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-icon">P</div>
      Proxy Admin
    </div>
    <nav>
      <a href="/dashboard" class="{% if active == 'dashboard' %}active{% endif %}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        仪表盘</a>
      <a href="/proxies" class="{% if active == 'proxies' %}active{% endif %}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        代理列表</a>
      <a href="/keys" class="{% if active == 'keys' %}active{% endif %}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
        Key 管理</a>
      <a href="/usage" class="{% if active == 'usage' %}active{% endif %}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        用量统计</a>
      <a href="/urls" class="{% if active == 'urls' %}active{% endif %}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        代理源管理</a>
      <a href="/settings" class="{% if active == 'settings' %}active{% endif %}">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        系统配置</a>
    </nav>
    <div class="bottom">
      <span>{{ user }}</span>
      <a href="/logout" style="color:var(--muted);font-size:.78rem">退出</a>
    </div>
  </aside>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
</div>
{% endblock %}
<div class="toast" id="toast"></div>
<script>
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function toggleSidebar(){document.querySelector('.sidebar').classList.toggle('open');document.getElementById('sidebarOverlay').classList.toggle('show')}
async function api(method,url,body){
  const csrf=(document.cookie.match(/csrf_token=([^;]+)/)||[])[1]||'';
  const opts={method,headers:{'Content-Type':'application/json','X-CSRF-Token':csrf}};
  if(body)opts.body=JSON.stringify(body);
  const r=await fetch(url,opts);
  return r.json();
}
// === 通用客户端分页 ===
function paginate(tableId, perPage=10){
  const table=document.getElementById(tableId);
  if(!table)return;
  const tbody=table.querySelector('tbody')||table;
  const rows=[...tbody.querySelectorAll('tr:not(:first-child)')];
  const total=rows.length;
  const pages=Math.ceil(total/perPage)||1;
  let cur=1;
  const pager=document.createElement('div');
  pager.className='pager';
  table.parentNode.insertBefore(pager,table.nextSibling);
  function render(){
    rows.forEach((r,i)=>{r.style.display=(i>=(cur-1)*perPage&&i<cur*perPage)?'':'none'});
    let html='<button '+(cur<=1?'disabled':'')+' onclick="this._pg(-1)">‹</button>';
    for(let i=1;i<=pages;i++){
      if(pages>7&&Math.abs(i-cur)>2&&i!==1&&i!==pages){if(i===cur-3||i===cur+3)html+='<span class="page-info">...</span>';continue}
      html+='<button class="'+(i===cur?'active':'')+'" onclick="this._pg('+i+')">'+i+'</button>';
    }
    html+='<button '+(cur>=pages?'disabled':'')+' onclick="this._pg(0)">›</button>';
    html+='<span class="page-info">'+total+' 条</span>';
    pager.innerHTML=html;
    pager.querySelectorAll('button').forEach(b=>{b._pg=function(v){if(v===-1)cur--;else if(v===0)cur++;else cur=v;render()};b.onclick=function(){this._pg&&this._pg(+this.textContent||0)}});
    // Re-bind arrow buttons
    const btns=pager.querySelectorAll('button');
    if(btns[0])btns[0].onclick=()=>{if(cur>1){cur--;render()}};
    if(btns[btns.length-2])btns[btns.length-2].onclick=()=>{if(cur<pages){cur++;render()}};
    for(let i=1;i<btns.length-2;i++){const p=parseInt(btns[i].textContent);if(!isNaN(p))btns[i].onclick=()=>{cur=p;render()}}
  }
  render();
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
